name: AFL Model Nightly Training

on:
  schedule:
    # 16:30 UTC = 2:30 AM AEST (UTC+10), run only Thu/Fri/Sat/Sun/Mon
    - cron: "30 16 * * 0,1,4,5,6"
  workflow_dispatch:

concurrency:
  group: afl-model-nightly
  cancel-in-progress: false

env:
  TZ: Australia/Brisbane

jobs:
  run_afl_model_nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install scikit-learn

      - name: Validate required secret
        run: |
          if [ -z "${{ secrets.PROD_URL }}" ]; then
            echo "Missing required secret: PROD_URL"
            exit 1
          fi

      - name: Refresh AFL model context files
        env:
          BASE_URL: ${{ secrets.PROD_URL }}
        run: |
          npm run fetch:afl:dfs-usage
          npm run fetch:afl:weather-context

      - name: Nightly candidate training and evaluation
        run: |
          python scripts/afl_model/build_dataset.py --base-url "${{ secrets.PROD_URL }}"
          python scripts/afl_model/train_disposals_model.py --candidate-only --importance-max-rows 2500 --drop-candidate-lookback 16 --drop-candidate-min-runs 6 --calibration-min-samples 140 --cv-folds 5 --tune-depth deep
          python scripts/afl_model/score_upcoming.py --base-url "${{ secrets.PROD_URL }}" --artifact "data/afl-model/models/latest-candidate-model.json" --latest-output-path "data/afl-model/latest-candidate-disposals-projections.json"
          python scripts/afl_model/evaluate_closed_loop.py --promote-if-pass --freeze-fail-streak 3 --candidate-artifact "data/afl-model/models/latest-candidate-model.json" --current-artifact "data/afl-model/models/latest-model.json" --candidate-projections "data/afl-model/latest-candidate-disposals-projections.json"
          # Always refresh live projections consumed by dashboard/top picks, even when candidate promotion is blocked.
          python scripts/afl_model/score_upcoming.py --base-url "${{ secrets.PROD_URL }}" --artifact "data/afl-model/models/latest-model.json" --latest-output-path "data/afl-model/latest-disposals-projections.json"

      - name: Commit and push nightly model outputs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/afl-model 2>/dev/null || true
          git add data/afl-dfs-usage-latest.json data/afl-weather-upcoming.json 2>/dev/null || true
          git add data/afl-dfs-usage-*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No nightly AFL model output changes"
          else
            git commit -m "chore(data): nightly AFL model training refresh [skip ci]"
            pushed=0
            for i in 1 2 3; do
              git fetch origin master
              if ! git rebase -X theirs origin/master; then
                echo "Rebase attempt $i failed; aborting and retrying..."
                git rebase --abort || true
                git reset --hard HEAD
                sleep 5
                continue
              fi
              if git push origin HEAD:master; then
                pushed=1
                break
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
            if [ "$pushed" -ne 1 ]; then
              echo "Failed to push after retries"
              exit 1
            fi
          fi




