# Warm is run by Vercel cron (vercel.json). This workflow is manual-only.
name: Warm AFL Props Stats Cache

on:
  workflow_dispatch:

concurrency:
  group: warm-afl-props-stats
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROD_URL: ${{ secrets.PROD_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check PROD_URL and CRON_SECRET
        id: check
        run: |
          if [ -z "${{ secrets.PROD_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ PROD_URL or CRON_SECRET not set; skipping"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Warm AFL props stats cache
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "🔄 Warming AFL prop stats cache (L5/L10/H2H/Season/Streak/DvP)..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET "${{ secrets.PROD_URL }}/api/afl/props-stats/warm" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -L --max-time 300) || true
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Response ($HTTP_STATUS): $BODY"
          if [ "$HTTP_STATUS" != "200" ] && [ -n "$HTTP_STATUS" ]; then
            echo "❌ Warm failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ AFL props stats warm completed"
