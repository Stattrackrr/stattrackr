# Premier League deep player-stats warm (incremental, full current season).
# Runs the same orchestrator as local: `npm run soccer:player-stats:pl`
# Scraping runs against a local Next server on the GitHub runner. Vercel serverless
# resets long Puppeteer requests before full-season team batches can finish.
name: Soccer PL Player Stats Warm

on:
  schedule:
    # Daily 04:00 UTC — incremental refresh after match days
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      team_concurrency:
        description: 'Parallel teams (keep 1 for deployed/serverless Puppeteer)'
        required: false
        default: '1'
      teams:
        description: 'Optional comma filter (e.g. arsenal,liverpool)'
        required: false
        default: ''
      dry_run:
        description: 'Print batch URLs only (no HTTP)'
        required: false
        type: boolean
        default: false

concurrency:
  group: soccer-pl-player-stats
  cancel-in-progress: false

env:
  TZ: Europe/London

jobs:
  warm_pl_player_stats:
    runs-on: ubuntu-latest
    # 20 teams × up to ~13 min per batch on Vercel (maxDuration 800s); allow headroom
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check cache secrets
        id: check
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ NEXT_PUBLIC_SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not set — add both in GitHub → Settings → Secrets → Actions"
            echo "   The workflow runs the scraper on the GitHub runner and writes player_stats directly to Supabase."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Warm Premier League player stats
        if: steps.check.outputs.configured == 'true'
        shell: bash
        run: |
          npm run dev > next-dev.log 2>&1 &
          NEXT_PID=$!

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! kill -0 "$NEXT_PID" 2>/dev/null; then
            echo "Local Next server exited before warm started"
            cat next-dev.log
            exit 1
          fi

          status=0
          npm run soccer:player-stats:pl || status=$?
          if [ "$status" -ne 0 ]; then
            echo "=== next-dev.log (tail) ==="
            tail -n 240 next-dev.log || true
          fi
          kill "$NEXT_PID" 2>/dev/null || true
          exit "$status"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SOCCER_PL_STATS_BASE_URL: http://127.0.0.1:3000
          # Keep team concurrency serial, then tune the in-team browser pool carefully.
          SOCCER_PL_STATS_TEAM_CONCURRENCY: ${{ github.event.inputs.team_concurrency || '1' }}
          SOCCER_PL_STATS_PLAYER_CONCURRENCY: '4'
          SOCCER_PL_STATS_MATCH_CONCURRENCY: '4'
          SOCCER_PL_STATS_FETCH_CONCURRENCY: '60'
          SOCCER_PL_STATS_MAX_PLAYERS: '35'
          SOCCER_PL_STATS_PUPPETEER_ONLY: '1'
          SOCCER_PL_STATS_LIMIT: 'season'
          SOCCER_PL_STATS_TEAMS: ${{ github.event.inputs.teams || '' }}
          SOCCER_PL_STATS_DRY_RUN: ${{ github.event.inputs.dry_run == true && '1' || '0' }}
          SOCCER_PL_STATS_FAIL_IF_EMPTY: '1'
