# Premier League deep player-stats warm (incremental, full current season).
# Runs the same orchestrator as local: `npm run soccer:player-stats:pl`
# Scraping happens on your deployed app (Puppeteer on Vercel), not on the runner.
name: Soccer PL Player Stats Warm

on:
  schedule:
    # Daily 04:00 UTC — incremental refresh after match days
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      team_concurrency:
        description: 'Parallel teams (default 3, same as local npm run soccer:player-stats:pl)'
        required: false
        default: '3'
      teams:
        description: 'Optional comma filter (e.g. arsenal,liverpool)'
        required: false
        default: ''
      dry_run:
        description: 'Print batch URLs only (no HTTP)'
        required: false
        type: boolean
        default: false

concurrency:
  group: soccer-pl-player-stats
  cancel-in-progress: false

env:
  TZ: Europe/London

jobs:
  warm_pl_player_stats:
    runs-on: ubuntu-latest
    # 20 teams × up to ~13 min per batch on Vercel (maxDuration 800s); allow headroom
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check PROD_URL and CRON_SECRET
        id: check
        run: |
          if [ -z "${{ secrets.PROD_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ PROD_URL or CRON_SECRET not set — add both in GitHub → Settings → Secrets → Actions"
            echo "   PROD_URL must match your Vercel deployment (no trailing slash)"
            echo "   CRON_SECRET must match Vercel env CRON_SECRET (batch API requires it in production)"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Warm Premier League player stats
        if: steps.check.outputs.configured == 'true'
        run: npm run soccer:player-stats:pl
        env:
          SOCCER_PL_STATS_BASE_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Same defaults as scripts/warm-soccer-player-stats-pl.js (local npm run soccer:player-stats:pl)
          SOCCER_PL_STATS_TEAM_CONCURRENCY: ${{ github.event.inputs.team_concurrency || '3' }}
          SOCCER_PL_STATS_PLAYER_CONCURRENCY: '6'
          SOCCER_PL_STATS_MATCH_CONCURRENCY: '25'
          SOCCER_PL_STATS_FETCH_CONCURRENCY: '60'
          SOCCER_PL_STATS_MAX_PLAYERS: '35'
          SOCCER_PL_STATS_PUPPETEER_ONLY: '1'
          SOCCER_PL_STATS_LIMIT: 'season'
          SOCCER_PL_STATS_TEAMS: ${{ github.event.inputs.teams || '' }}
          SOCCER_PL_STATS_DRY_RUN: ${{ github.event.inputs.dry_run == true && '1' || '0' }}
          SOCCER_PL_STATS_FAIL_IF_EMPTY: '1'
