# AFL player props ingest – same pattern as NBA Process Player Props.
# 1) Refresh odds (get games from Odds API), 2) refresh player props cache, 3) DvP build, 4) stats warm.
# All steps run in /api/afl/odds/refresh; this workflow triggers it on a schedule.
name: Process AFL Player Props

on:
  schedule:
    - cron: '0 * * * *'  # Every hour at :00 (same as NBA)
  workflow_dispatch:
    inputs:
      trigger:
        description: 'What triggered this workflow'
        required: false
        default: 'manual'

concurrency:
  group: process-afl-player-props
  cancel-in-progress: false

env:
  TZ: Australia/Melbourne

jobs:
  afl_ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROD_URL: ${{ secrets.PROD_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check PROD_URL and CRON_SECRET
        id: check
        run: |
          if [ -z "${{ secrets.PROD_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ PROD_URL or CRON_SECRET not set; skipping"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Refresh AFL odds and player props
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "🔄 Refreshing AFL odds and player props (same as NBA flow: get odds → props → stats)..."
          RESPONSE=$(curl -s -X GET "${{ secrets.PROD_URL }}/api/afl/odds/refresh" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -L \
            --max-time 300 \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            --fail-with-body 2>&1) || EXIT_CODE=$?
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Response ($HTTP_STATUS): $BODY"
          if [ "$HTTP_STATUS" != "200" ] && [ -n "$HTTP_STATUS" ]; then
            echo "❌ AFL odds/props refresh failed with HTTP status: $HTTP_STATUS"
            echo "Response: $BODY"
            exit 1
          fi
          if [ -n "$EXIT_CODE" ]; then
            echo "❌ AFL odds/props refresh failed with exit code: $EXIT_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          echo "✅ Odds refresh completed successfully"
          if command -v jq &>/dev/null; then
            GAMES=$(echo "$BODY" | jq -r '.gamesCount // "?"')
            EVENTS=$(echo "$BODY" | jq -r '.eventsRefreshed // "?"')
            PLAYERS=$(echo "$BODY" | jq -r '.playersWithProps // "?"')
            WARMED=$(echo "$BODY" | jq -r '.statsWarmed // "?"')
            FAILED=$(echo "$BODY" | jq -r '.statsFailed // "?"')
            echo "✅ AFL ingest OK. Games: $GAMES | Events: $EVENTS | Players: $PLAYERS | Stats warmed: $WARMED | Failed (N/A): $FAILED"
            echo ""
            echo "Players processed (same as NBA):"
            echo "$BODY" | jq -r '.playerNames[]? // empty' | while read -r name; do
              [ -n "$name" ] && echo "  ✅ $name"
            done
            if [ -z "$(echo "$BODY" | jq -r '.playerNames[0]? // empty')" ]; then
              echo "  (none this run)"
            fi
            if [ "$FAILED" != "?" ] && [ "$FAILED" != "0" ] && [ -n "$FAILED" ]; then
              echo ""
              echo "⚠️ N/A debug: $FAILED props have no stats (will show N/A on props page). Fetching breakdown..."
              NA_RESPONSE=$(curl -s -X GET "${{ secrets.PROD_URL }}/api/afl/player-props/list?enrich=true&debugStats=1" -L --max-time 60 2>&1) || true
              if command -v jq &>/dev/null && [ -n "$NA_RESPONSE" ]; then
                NA_SUMMARY=$(echo "$NA_RESPONSE" | jq -r '.naSummary // empty')
                if [ -n "$NA_SUMMARY" ]; then
                  echo "  naSummary: $NA_SUMMARY"
                fi
                NA_REASONS=$(echo "$NA_RESPONSE" | jq -r '._meta.naReasons // empty' 2>/dev/null)
                if [ -n "$NA_REASONS" ] && [ "$NA_REASONS" != "null" ]; then
                  echo "  Why N/A (count by reason):"
                  echo "$NA_REASONS" | jq -r 'to_entries[] | "    \(.key): \(.value)"' 2>/dev/null || echo "    $NA_REASONS"
                fi
                SAMPLE=$(echo "$NA_RESPONSE" | jq -r '._meta.debugNaSample[0:10] // empty' 2>/dev/null)
                if [ -n "$SAMPLE" ] && [ "$SAMPLE" != "[]" ]; then
                  echo "  Sample N/A props (first 10):"
                  echo "$SAMPLE" | jq -r '.[] | "    \(.playerName) | \(.statType) | \(.reason)"' 2>/dev/null || true
                fi
                HINT=$(echo "$NA_RESPONSE" | jq -r '._meta.hint // empty' 2>/dev/null)
                if [ -n "$HINT" ] && [ "$HINT" != "null" ]; then
                  echo "  Hint: $HINT"
                fi
              fi
            fi
          else
            echo "Response: $BODY"
          fi

      - name: N/A report (props with no stats)
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "📊 N/A report – props that will show N/A on the props page"
          RESPONSE=$(curl -s -X GET "${{ secrets.PROD_URL }}/api/afl/player-props/list?enrich=true&debugStats=1" -L --max-time 90 2>&1) || true
          if command -v jq &>/dev/null && [ -n "$RESPONSE" ]; then
            TOTAL=$(echo "$RESPONSE" | jq -r '.naSummary.totalProps // "?"')
            WITH_STATS=$(echo "$RESPONSE" | jq -r '.naSummary.withStats // "?"')
            NA_COUNT=$(echo "$RESPONSE" | jq -r '.naSummary.naCount // "?"')
            NA_PCT=$(echo "$RESPONSE" | jq -r '.naSummary.naPct // "?"')
            echo "  Total props: $TOTAL | With stats: $WITH_STATS | N/A count: $NA_COUNT ($NA_PCT%)"
            echo "$RESPONSE" | jq -r '._meta.naReasons // empty' | jq -r 'to_entries[]? | "  Reason \"\(.key)\": \(.value) props"' 2>/dev/null || true
          fi
