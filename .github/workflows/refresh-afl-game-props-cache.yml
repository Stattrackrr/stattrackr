name: Refresh AFL Game Props Cache

on:
  schedule:
    # 20:00 UTC = 6:00 AM AEST / 7:00 AM AEDT
    - cron: "0 20 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-afl-game-props-cache
  cancel-in-progress: false

jobs:
  refresh_afl_game_props_cache:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate required secrets
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_URL}" ]; then
            echo "Missing required secret: PROD_URL"
            exit 1
          fi
          if [ -z "${CRON_SECRET}" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

      - name: Refresh AFL odds and game props cache
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          RESPONSE_FILE="$(mktemp)"
          HTTP_STATUS="$(curl -sS -L --max-time 360 \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -o "${RESPONSE_FILE}" \
            -w "%{http_code}" \
            "${PROD_URL}/api/afl/odds/refresh")"

          echo "HTTP status: ${HTTP_STATUS}"
          cat "${RESPONSE_FILE}"

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "AFL cache refresh failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          python3 - "${RESPONSE_FILE}" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())
          if payload.get("success") is not True:
              raise SystemExit(f"AFL cache refresh returned success=false: {payload}")
          print(
              "Refreshed AFL cache:",
              f"games={payload.get('gamesCount')}",
              f"events={payload.get('eventsRefreshed')}/{payload.get('eventsAttempted')}",
              f"players={payload.get('playersWithProps')}",
          )
          PY
