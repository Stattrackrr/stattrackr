# Heavy World Cup dashboard workflow:
# 1. Incrementally ingest BDL 2026 stats and rebuild dashboard side panels and DvP.
# 2. Warm all team dashboard blobs.
# 3. Refresh Bet365 odds, then cache-check/warm live-odds player dashboards only.
name: World Cup Dashboard Warm

# Scheduled warm paused while World Cup is publicly closed (WORLD_CUP_PUBLIC_ENABLED=false).
# Re-enable the cron when reopening; workflow_dispatch still works for manual recovery.
"on":
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: "Full BDL rebuild instead of incremental"
        required: false
        type: boolean
        default: false
      with_photos:
        description: "Include squad photo warm"
        required: false
        type: boolean
        default: false

concurrency:
  group: world-cup-dashboard-warm
  cancel-in-progress: false

env:
  TZ: Australia/Melbourne

jobs:
  dashboard_warm:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PROD_URL: ${{ secrets.PROD_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
      BALL_DONT_LIE_API_KEY: ${{ secrets.BALL_DONT_LIE_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for name in PROD_URL CRON_SECRET NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY API_FOOTBALL_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret/env: ${name}"
              missing=1
            fi
          done
          if [ -z "${BALLDONTLIE_API_KEY:-}" ] && [ -z "${BALL_DONT_LIE_API_KEY:-}" ]; then
            echo "Missing required secret/env: BALLDONTLIE_API_KEY or BALL_DONT_LIE_API_KEY"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Ingest BDL stats and warm team dashboards, side panels, and DvP
        run: |
          set -euo pipefail
          ARGS="--dashboard-warm --skip-player-dashboards"
          if [ "${{ github.event.inputs.full_rebuild }}" = "true" ]; then
            ARGS="${ARGS} --full"
          fi
          if [ "${{ github.event.inputs.with_photos }}" = "true" ]; then
            ARGS="${ARGS} --with-photos"
          fi
          echo "Running: npx tsx scripts/build-world-cup-opponent-breakdown.ts ${ARGS}"
          npx --node-options=--max-old-space-size=8192 tsx scripts/build-world-cup-opponent-breakdown.ts ${ARGS}
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Refresh Bet365 odds for live player targets
        run: |
          set -euo pipefail
          echo "Refreshing API-Football Bet365 player props list for live dashboard targets..."
          npx --node-options=--max-old-space-size=8192 tsx scripts/build-world-cup-opponent-breakdown.ts --refresh-odds
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Warm live-odds player dashboards
        run: |
          set -euo pipefail
          echo "Cache-checking/warming World Cup player dashboards only for players with live Bet365 odds..."
          npx --node-options=--max-old-space-size=8192 tsx scripts/build-world-cup-opponent-breakdown.ts --dashboard-warm --step=10 --skip-intl --skip-cached-teams --live-odds-player-only
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
