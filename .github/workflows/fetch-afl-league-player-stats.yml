name: Fetch AFL League Player Stats

on:
  # Run once daily (e.g. 6:30 AM UTC ≈ 5:30 PM AEDT)
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-afl-league-stats
  cancel-in-progress: false

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch FootyWire league player stats
        run: npm run fetch:footywire-league-player-stats
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Commit and push if data changed (only when playerCount > 0)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in data/afl-league-player-stats-*.json; do
            if [ -f "$f" ] && [ "$(node -p "require('./$f').playerCount > 0")" = "true" ]; then
              git add "$f"
            fi
          done
          if git diff --staged --quiet; then
            echo "No changes to AFL league player stats (or no valid data to commit)"
          else
            git commit -m "chore(data): update AFL league player stats [skip ci]"
            git push
          fi
