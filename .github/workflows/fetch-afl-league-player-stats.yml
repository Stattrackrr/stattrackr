name: Fetch AFL League Player Stats

on:
  # Run once daily (e.g. 6:30 AM UTC ≈ 5:30 PM AEDT)
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-afl-league-stats
  cancel-in-progress: false

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch FootyWire league player stats
        run: npm run fetch:footywire-league-player-stats
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/afl-league-player-stats-*.json
          if git diff --staged --quiet; then
            echo "No changes to AFL league player stats"
          else
            git commit -m "chore(data): update AFL league player stats [skip ci]"
            git push
          fi
