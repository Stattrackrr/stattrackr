# Single AFL stats workflow: Compare tab (league stats), Opponent Breakdown (team rankings),
# player logs cache warm, optional odds/props refresh, props-stats warm, top-picks enrich.
# Model train/score lives in afl-model-daily.yml and afl-model-nightly.yml.
name: AFL Process Stats

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:
    inputs:
      warm_limit:
        description: 'Optional player limit for logs warm (0 = all)'
        required: false
        default: '0'
      seasons:
        description: 'Seasons to warm for player logs (default 2026,2025,2024)'
        required: false
        default: '2026,2025,2024'

concurrency:
  group: afl-process-stats
  cancel-in-progress: false

env:
  TZ: Australia/Melbourne

jobs:
  process_stats:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
    env:
      PROD_URL: ${{ secrets.PROD_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # FootyWire blocks GitHub Actions / Vercel. League stats are refreshed weekly from home:
      #   npm run refresh:afl:footywire:weekly
      # then commit data/*.json and push. CI uses the committed files below.
      - name: Use committed league player stats (FootyWire refreshed locally)
        run: |
          for SEASON in 2026 2025; do
            GAMES=$(node -e "try { const j=require('./data/afl-league-player-stats-'+process.argv[1]+'.json'); const m=Math.max(...(j.players||[]).map(p=>Number(p.games)||0),0); process.stdout.write(String(m)); } catch { process.stdout.write('0'); }" "$SEASON")
            GEN=$(node -e "try{const j=require('./data/afl-league-player-stats-'+process.argv[1]+'.json');process.stdout.write(j.generatedAt||'missing');}catch{process.stdout.write('missing');}" "$SEASON")
            echo "League stats ${SEASON}: max games ${GAMES}, generatedAt ${GEN}"
          done

      # Prefetch AFL player headshots for props page avatars (yearly cache file committed below).
      - name: Prefetch AFL player headshots (2026)
        run: |
          npm run prefetch:afl:headshots -- --season=2026 --concurrency=10

      # Opponent Breakdown team rankings — refreshed with refresh:afl:footywire:weekly from home.
      - name: Use committed team rankings (FootyWire refreshed locally)
        run: |
          for SEASON in 2026 2025; do
            test -f "data/afl-team-rankings-${SEASON}-oa.json" && echo "Team rankings ${SEASON}: ok" || echo "⚠️ Missing data/afl-team-rankings-${SEASON}-oa.json"
          done

      - name: Use committed injuries and team selections (FootyWire refreshed locally)
        run: |
          test -f data/afl-injuries.json && echo "Injuries snapshot: ok" || echo "⚠️ Missing data/afl-injuries.json"
          test -f data/afl-team-selections-snapshot.json && echo "Team selections snapshot: ok" || echo "⚠️ Missing data/afl-team-selections-snapshot.json"

      # Build DvP files locally from latest player logs. Only rebuild Depth when the DFS role map
      # is populated, otherwise the builder falls back to default roles and can wipe specialist
      # roles like key_fwd / wng_def / des_kck from the tracked depth dataset.
      - name: Build AFL DvP files (Basic + Depth) 2026
        run: |
          npm run build:afl:dvp -- --season=2026 --base-url="${{ secrets.PROD_URL }}" --concurrency=16
          ROLE_MAP_COUNT=$(node -e "try { const fs = require('fs'); const j = JSON.parse(fs.readFileSync('data/afl-dfs-role-map-latest.json', 'utf8')); process.stdout.write(String(Number(j?.count || 0))); } catch { process.stdout.write('0'); }")
          echo "DFS role map count: ${ROLE_MAP_COUNT}"
          if [ "${ROLE_MAP_COUNT}" -gt "0" ]; then
            npm run build:afl:dvp:depth -- --season=2026 --base-url="${{ secrets.PROD_URL }}" --concurrency=16
            node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('data/afl-dvp-depth-2026.json', 'utf8'));
            const rows = Array.isArray(data?.rows) ? data.rows : [];
            const roles = new Set(rows.map((r) => String(r?.depthRole || '')).filter(Boolean));
            const required = ['key_fwd', 'gen_fwd', 'ins_mid', 'ruck', 'wng_def', 'gen_def', 'des_kck'];
            const missing = required.filter((role) => !roles.has(role));
            if (missing.length) {
              console.error('Missing depth DvP roles: ' + missing.join(', '));
              process.exit(1);
            }
            console.log('✅ Depth DvP role coverage validation passed');
            "
          else
            echo "⚠️ DFS role map is empty; skipping depth DvP rebuild so the tracked depth dataset is preserved."
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=1024'

      # Guardrail: Player vs Team relies on these advanced fields.
      # - League player stats: UP/CP/MG/FF (player-side advanced rankings)
      # - Team rankings OA: UP/CP/MG (opponent-side advanced values/rankings)
      - name: Validate Player vs Team advanced stats payloads
        run: |
          node -e "
          const fs = require('fs');
          const seasons = [2026, 2025];
          const errors = [];
          for (const season of seasons) {
            const lp = JSON.parse(fs.readFileSync('data/afl-league-player-stats-' + season + '.json', 'utf8'));
            const players = Array.isArray(lp?.players) ? lp.players : [];
            const hasPlayerAdvanced = players.some((p) =>
              Number.isFinite(Number(p?.uncontested_possessions)) ||
              Number.isFinite(Number(p?.contested_possessions)) ||
              Number.isFinite(Number(p?.meters_gained)) ||
              Number.isFinite(Number(p?.free_kicks_for))
            );
            if (!hasPlayerAdvanced) errors.push('Missing player advanced fields in afl-league-player-stats-' + season + '.json');

            const oa = JSON.parse(fs.readFileSync('data/afl-team-rankings-' + season + '-oa.json', 'utf8'));
            const cols = Array.isArray(oa?.statColumns) ? oa.statColumns : [];
            const teams = Array.isArray(oa?.teams) ? oa.teams : [];
            const colsOk = ['CP', 'UP', 'MG'].every((k) => cols.includes(k));
            const rowsOk = teams.some((t) =>
              Number.isFinite(Number(t?.stats?.CP)) &&
              Number.isFinite(Number(t?.stats?.UP)) &&
              Number.isFinite(Number(t?.stats?.MG))
            );
            if (!colsOk || !rowsOk) errors.push('Missing OA advanced fields in afl-team-rankings-' + season + '-oa.json');
          }
          if (errors.length) {
            console.error('Player vs Team validation failed:\\n' + errors.map((e) => '- ' + e).join('\\n'));
            process.exit(1);
          }
          console.log('✅ Player vs Team advanced stats validation passed');
          "

      - name: Commit and push data files to master if changed
        run: |
          bash scripts/ci-commit-data-files.sh "chore(data): update AFL stats, rankings, and headshots [skip ci]" \
            "data/afl-league-player-stats-*.json" \
            "data/afl-team-rankings-*.json" \
            "data/afl-player-headshots*.json" \
            "data/afl-dvp*.json" \
            "data/afl-injuries.json" \
            "data/afl-team-selections-snapshot.html" \
            "data/afl-team-selections-snapshot.json"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Check PROD_URL and CRON_SECRET
        id: check
        run: |
          if [ -z "${{ secrets.PROD_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ PROD_URL or CRON_SECRET not set; skipping warm and odds/refresh"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      # Player logs cache warm (Redis) — do not prewarm enriched list here; it would re-seed
      # last week's slate before odds/props refresh runs later in this workflow.
      - name: Warm AFL player logs cache
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "🔄 Warming AFL player logs cache..."
          npm run warm:afl:player-logs
        env:
          AFL_WARM_LIMIT: ${{ github.event.inputs.warm_limit || '0' }}
          AFL_WARM_SEASONS: ${{ github.event.inputs.seasons || '2026,2025,2024' }}
          AFL_WARM_FORCE_FETCH_SEASONS: '2026'
          AFL_WARM_FORCE_CONCURRENCY: '8'
          AFL_WARM_CONCURRENCY: '16'
          AFL_WARM_MAX_FAILURES: '100'

      - name: Enrich Top Picks actual disposals
        if: steps.check.outputs.configured == 'true'
        run: npm run enrich:afl:top-picks -- --base-url="${{ secrets.PROD_URL }}"

      - name: Commit Top Picks actuals if changed
        if: steps.check.outputs.configured == 'true'
        run: |
          bash scripts/ci-commit-data-files.sh "chore(data): enrich AFL top picks actual disposals [skip ci]" \
            data/afl-model/history/top-picks-history.json
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # Odds API quota and props-stats warm timeouts are optional — do not fail the workflow.
      - name: Refresh AFL odds and player props
        if: steps.check.outputs.configured == 'true'
        continue-on-error: true
        run: |
          echo "🔄 Refreshing AFL odds and player props (stats warm runs separately)..."
          RESPONSE=$(curl -s -X GET "${{ secrets.PROD_URL }}/api/afl/odds/refresh?skipWarm=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -L --max-time 360 \
            --write-out "\nHTTP_STATUS:%{http_code}" 2>&1) || true
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Response ($HTTP_STATUS): $BODY"
          ODDS_OK=$(node -e "try { const j = JSON.parse(process.argv[1]); process.stdout.write(j.oddsOk === true ? 'true' : 'false'); } catch { process.stdout.write('false'); }" "$BODY")
          if [ "$ODDS_OK" = "true" ]; then
            echo "✅ AFL odds and props refreshed"
          else
            echo "⚠️ AFL odds/props refresh skipped or failed (quota/key) — continuing with cached odds and player logs"
          fi

      - name: Warm AFL props stats cache
        if: steps.check.outputs.configured == 'true'
        continue-on-error: true
        run: |
          echo "🔄 Warming AFL props stats from player game logs..."
          RESPONSE=$(curl -s -X GET "${{ secrets.PROD_URL }}/api/afl/props-stats/warm?skipListEnrich=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -L --max-time 660 \
            --write-out "\nHTTP_STATUS:%{http_code}" 2>&1) || true
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Response ($HTTP_STATUS): $BODY"
          if [ "$HTTP_STATUS" != "200" ] || [ -z "$HTTP_STATUS" ]; then
            echo "⚠️ AFL props-stats warm skipped or failed (HTTP ${HTTP_STATUS:-unknown}) — continuing"
            exit 0
          fi
          COVERAGE=$(node -e "try { const j = JSON.parse(process.argv[1]); process.stdout.write(String(j.coveragePct ?? 100)); } catch { process.stdout.write('100'); }" "$BODY")
          NO_DATA=$(node -e "try { const j = JSON.parse(process.argv[1]); process.stdout.write(String(j.noData ?? 0)); } catch { process.stdout.write('0'); }" "$BODY")
          TOTAL=$(node -e "try { const j = JSON.parse(process.argv[1]); process.stdout.write(String(j.total ?? 0)); } catch { process.stdout.write('0'); }" "$BODY")
          WARMED=$(node -e "try { const j = JSON.parse(process.argv[1]); process.stdout.write(String(j.warmed ?? 0)); } catch { process.stdout.write('0'); }" "$BODY")
          echo "AFL props-stats coverage: ${COVERAGE}% (warmed=${WARMED}, noData=${NO_DATA}, total=${TOTAL})"
          if [ "${TOTAL}" -gt "0" ] && [ "${COVERAGE}" -lt "50" ]; then
            echo "⚠️ AFL props-stats coverage below threshold (50%) — continuing"
          elif [ "${TOTAL}" -gt "0" ] && [ "${COVERAGE}" -lt "90" ]; then
            echo "⚠️ AFL props-stats coverage below ideal (90%) but above minimum — continuing"
          else
            echo "✅ Props stats warm done"
          fi

      - name: Prewarm AFL enriched props list for props page
        if: steps.check.outputs.configured == 'true'
        continue-on-error: true
        run: |
          echo "🔄 Building enriched AFL props list cache for /props page..."
          RESPONSE=$(curl -s -X GET "${{ secrets.PROD_URL }}/api/afl/player-props/list?enrich=true" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Accept: application/json" \
            -L --max-time 360 \
            --write-out "\nHTTP_STATUS:%{http_code}" 2>&1) || true
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY_FILE="$RUNNER_TEMP/afl-enriched-list-body.json"
          echo "$RESPONSE" | sed '/HTTP_STATUS:/d' > "$BODY_FILE"
          PROPS=$(node -e "const fs=require('fs'); try { const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(j.propsCount ?? (Array.isArray(j.data)?j.data.length:0))); } catch { process.stdout.write('0'); }" "$BODY_FILE")
          GAMES=$(node -e "const fs=require('fs'); try { const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(j.gamesCount ?? (Array.isArray(j.games)?j.games.length:0))); } catch { process.stdout.write('0'); }" "$BODY_FILE")
          echo "Enriched list prewarm HTTP ${HTTP_STATUS:-?}: games=${GAMES} props=${PROPS}"
          if [ "${HTTP_STATUS}" = "200" ] && [ "${PROPS}" -gt "0" ]; then
            echo "✅ Enriched AFL props list cached"
          else
            echo "⚠️ Enriched list prewarm did not populate props (props page may rebuild on first load)"
          fi

      # Guardrail: ensure list DvP ranks match DvP card source for all props rows.
      # Fails workflow on any mismatch so regressions are caught before users see split ranks.
      - name: Validate AFL DvP consistency across all props players
        if: steps.check.outputs.configured == 'true'
        run: |
          node scripts/validate-afl-dvp-consistency.js --season=2026 --attempts=3 --delay_ms=15000 --max_mismatches=0
