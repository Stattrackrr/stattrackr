name: AFL Model Daily

on:
  schedule:
    # 11:00 UTC = 9:00 PM AEST (UTC+10)
    - cron: "0 11 * * *"
  workflow_dispatch:

concurrency:
  group: afl-model-daily
  cancel-in-progress: false

env:
  TZ: Australia/Brisbane

jobs:
  run_afl_model:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install scikit-learn

      - name: Validate required secret
        run: |
          if [ -z "${{ secrets.PROD_URL }}" ]; then
            echo "Missing required secret: PROD_URL"
            exit 1
          fi

      - name: Refresh AFL model context files
        env:
          BASE_URL: ${{ secrets.PROD_URL }}
        run: |
          npm run fetch:afl:dfs-usage
          npm run fetch:afl:dfs-role-map
          npm run fetch:afl:weather-context

      - name: Build dataset, train candidate, score candidate
        run: |
          python scripts/afl_model/build_dataset.py --base-url "${{ secrets.PROD_URL }}"
          python scripts/afl_model/train_disposals_model.py --candidate-only
          python scripts/afl_model/score_upcoming.py --base-url "${{ secrets.PROD_URL }}" --artifact "data/afl-model/models/latest-candidate-model.json" --latest-output-path "data/afl-model/latest-candidate-disposals-projections.json" --skip-line-history-enrich

      - name: Evaluate vs settled picks and promote candidate to live (if guardrails pass)
        run: |
          python scripts/afl_model/evaluate_closed_loop.py --promote-if-pass --freeze-fail-streak 3 --candidate-artifact "data/afl-model/models/latest-candidate-model.json" --current-artifact "data/afl-model/models/latest-model.json" --candidate-projections "data/afl-model/latest-candidate-disposals-projections.json"
          python -c "import json; p='data/afl-model/history/model-eval-latest.json'; d=json.load(open(p)); dec=d.get('decision',{}); c=d.get('candidate',{}); u=d.get('current',{}); print('=== AFL closed-loop: pass=', dec.get('pass'), 'promoted=', dec.get('promoted'), '| candidate', c.get('modelVersion'), '| live', u.get('modelVersion'))"
          python scripts/afl_model/score_upcoming.py --base-url "${{ secrets.PROD_URL }}" --artifact "data/afl-model/models/latest-model.json" --latest-output-path "data/afl-model/latest-disposals-projections.json" --skip-line-history-enrich

      - name: Verify live projections landed at the canonical path
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const path = 'data/afl-model/latest-disposals-projections.json';
            if (!fs.existsSync(path)) {
              console.error('Missing live projections file:', path);
              process.exit(1);
            }
            const payload = JSON.parse(fs.readFileSync(path, 'utf8'));
            const generatedAt = String(payload.generatedAt || '');
            const rows = Array.isArray(payload.rows) ? payload.rows.length : 0;
            const ageMs = generatedAt ? Date.now() - Date.parse(generatedAt) : Number.POSITIVE_INFINITY;
            console.log('Live projections:', { generatedAt, rows, ageHours: Number.isFinite(ageMs) ? (ageMs / 36e5).toFixed(1) : 'n/a' });
            if (!generatedAt || !Number.isFinite(Date.parse(generatedAt))) {
              console.error('Live projections missing generatedAt');
              process.exit(1);
            }
            if (rows < 1) {
              console.error('Live projections have no rows');
              process.exit(1);
            }
            // Fail if the file is older than ~36h — usually means CI nested the write under data/afl-model/afl-model.
            if (ageMs > 36 * 36e5) {
              console.error('Live projections look stale; refusing to commit nested/stale outputs');
              process.exit(1);
            }
          "
          if [ -d data/afl-model/afl-model ]; then
            echo "Removing accidental nested data/afl-model/afl-model before commit"
            rm -rf data/afl-model/afl-model
          fi

      # Include top-picks-history.json: score_upcoming soft-locks / re-ranks upcoming Top 3
      # into that file. Excluding it left Current-round rankings stuck until a manual refresh.
      - name: Commit and push model outputs to master if changed
        run: |
          rm -rf data/afl-model/afl-model
          bash scripts/ci-commit-data-files.sh "chore(data): daily AFL model refresh [skip ci]" \
            data/afl-model \
            data/afl-dfs-usage-latest.json \
            data/afl-weather-upcoming.json \
            "data/afl-dfs-usage-*.json" \
            "data/afl-dfs-role-map-*.json"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CI_COMMIT_GIT_LFS: "1"

