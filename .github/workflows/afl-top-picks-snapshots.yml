name: AFL Top Picks Snapshots

on:
  schedule:
    # Every 30 minutes on Thu/Fri/Sat/Sun/Mon so games are finalized inside the 2h pre-bounce window.
    - cron: "*/30 * * * 0,1,4,5,6"
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Pregame finalize window in hours"
        required: false
        default: "2"
      force:
        description: "Replace already-finalized game snapshots"
        required: false
        type: boolean
        default: false

concurrency:
  group: afl-top-picks-snapshots
  cancel-in-progress: false

env:
  TZ: Australia/Brisbane

jobs:
  snapshot_top_picks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Finalize eligible Top Picks snapshots
        env:
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '2' }}
          FORCE_SNAPSHOT: ${{ github.event.inputs.force || 'false' }}
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          ARGS="--window-hours=${WINDOW_HOURS}"
          if [ "${FORCE_SNAPSHOT}" = "true" ]; then
            ARGS="${ARGS} --force"
          fi
          npm run snapshot:afl:top-picks -- ${ARGS}
          if [ -n "${PROD_URL}" ]; then
            npm run enrich:afl:top-picks -- --base-url="${PROD_URL}"
          fi

      - name: Commit and push Top Picks history if changed
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci-commit-data-files.sh "chore(data): snapshot AFL top picks [skip ci]" \
            data/afl-model/history/top-picks-history.json
